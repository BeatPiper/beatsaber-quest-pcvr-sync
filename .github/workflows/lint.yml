name: lint

on:
  push:
    branches: [master]
    paths-ignore: ['**/README.md']
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [20]

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Setup node env 🏗
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install --frozen-lockfile

      - name: Run linter 👀
        run: pnpm lint
